name: Daily Auto Commit

on:
  schedule:
    - cron: '17 3 * * *'   # Runs daily at 03:17 UTC (specific time, no wildcards)
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 23f2003927@ds.study.iitm.ac.in - Generate daily update
        run: |
          echo "Last update: $(date -u)" > daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update $(date -u)" || echo "No changes to commit"
          git push
